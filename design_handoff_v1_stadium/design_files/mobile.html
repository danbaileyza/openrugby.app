<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Open Rugby · Stadium · Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07100c;--bg2:#0b1712;--ink:#ecf3ee;--muted:#7a8a82;
  --line:rgba(255,255,255,.08);--yellow:#ffd100;--green:#1d8a5b;
  --red:#e63946;
}
*{box-sizing:border-box}
html,body{margin:0;background:#13181a;color:#fff;font-family:Archivo,system-ui,sans-serif;min-height:100vh;}
.page-head{padding:32px 40px 16px;color:#fff;}
.page-head h1{font-family:Archivo;font-weight:900;font-size:44px;letter-spacing:-.03em;margin:0;text-transform:uppercase;}
.page-head h1 .y{color:var(--yellow);}
.page-head p{color:#aab4ad;max-width:60ch;}
.crumb{font-family:"JetBrains Mono",monospace;font-size:11px;color:#7a8a82;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;}
.crumb a{color:var(--yellow);text-decoration:none;}
.stage{display:flex;gap:32px;padding:20px 40px 80px;overflow-x:auto;align-items:flex-start;}
.frame-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:12px;}
.frame-label{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--yellow);letter-spacing:.2em;text-transform:uppercase;}
.frame-sub{font-family:"JetBrains Mono",monospace;font-size:10px;color:#7a8a82;letter-spacing:.1em;}
.switcher{position:fixed;bottom:20px;right:20px;background:rgba(10,15,12,.9);border:1px solid var(--line);backdrop-filter:blur(10px);padding:6px;border-radius:6px;z-index:50;display:flex;gap:4px;font-family:"JetBrains Mono",monospace;font-size:11px;}
.switcher a{padding:6px 10px;border-radius:3px;color:#aab4ad;text-decoration:none;}
.switcher a.active{background:var(--yellow);color:#0a1410;font-weight:700;}
.switcher .label{color:#6a746d;padding:6px 8px;border-right:1px solid var(--line);}
</style>
</head>
<body data-screen-label="01 V1 Stadium Mobile">

<section class="page-head">
  <div class="crumb"><a href="dashboard.html">← back to desktop</a></div>
  <h1>Stadium<span class="y">·</span>Mobile</h1>
  <p>Three mobile screens in the Stadium visual language — Dashboard with live scores up top, in-progress Match detail, and Player profile. Scroll inside each device to see the full screen.</p>
</section>

<div class="stage" id="stage"></div>

<div class="switcher">
  <span class="label">VIEW</span>
  <a href="dashboard.html">← DESKTOP</a>
  <a class="active" href="mobile.html">MOBILE</a>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
const C = {
  bg:'#07100c', bg2:'#0b1712', bg3:'#111c17', ink:'#ecf3ee',
  muted:'#7a8a82', line:'rgba(255,255,255,.08)', yellow:'#ffd100',
  green:'#6cd4a4', red:'#e63946'
};
const mono = '"JetBrains Mono", monospace';
const arch = 'Archivo, system-ui, sans-serif';

/* ====== shared app chrome ====== */
function AppChrome({ title, children, tab = 'home' }) {
  return (
    <div style={{background:C.bg, minHeight:'100%', color:C.ink, fontFamily:arch, display:'flex', flexDirection:'column'}}>
      {/* status bar spacer */}
      <div style={{height:54, flexShrink:0}} />

      {/* header */}
      <div style={{padding:'8px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div style={{display:'flex', alignItems:'center', gap:8, fontWeight:900, letterSpacing:'-.01em', fontSize:17}}>
          <span style={{width:22, height:15, borderRadius:'50%', background:'linear-gradient(135deg,#d4a574,#8b5a2b)', transform:'rotate(-18deg)', display:'inline-block'}} />
          Open Rugby
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          <div style={{width:32, height:32, borderRadius:'50%', background:C.bg2, border:`1px solid ${C.line}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontFamily:mono, color:C.yellow}}>D</div>
        </div>
      </div>

      {/* title */}
      <div style={{padding:'4px 20px 14px'}}>
        <div style={{fontFamily:mono, fontSize:10, color:C.muted, letterSpacing:'.2em', textTransform:'uppercase', marginBottom:4}}>OPEN RUGBY</div>
        <div style={{fontFamily:arch, fontWeight:900, fontSize:34, lineHeight:'.9', letterSpacing:'-.03em', textTransform:'uppercase'}}>
          {title.split('|').map((t,i)=><span key={i} style={{color: i%2 ? C.yellow : C.ink, display:'block'}}>{t}</span>)}
        </div>
      </div>

      {/* content */}
      <div style={{flex:1, overflow:'auto', paddingBottom:80}}>
        {children}
      </div>

      {/* bottom tab bar */}
      <div style={{
        position:'absolute', left:12, right:12, bottom:16,
        background:'rgba(5,9,8,.85)', border:`1px solid ${C.line}`, borderRadius:28,
        backdropFilter:'blur(20px)', display:'flex', padding:6, zIndex:40,
        boxShadow:'0 8px 24px rgba(0,0,0,.45)'
      }}>
        {[
          {k:'home',l:'Home',i:'⌂'},
          {k:'live',l:'Live',i:'●',dot:true},
          {k:'teams',l:'Teams',i:'△'},
          {k:'players',l:'Players',i:'◉'},
          {k:'ask',l:'Ask',i:'?'},
        ].map(t=>(
          <div key={t.k} style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2, padding:'8px 0',
            background: tab===t.k ? C.yellow : 'transparent',
            color: tab===t.k ? '#0a1410' : '#aab4ad',
            borderRadius:22, fontWeight: tab===t.k ? 800 : 500, fontFamily:mono, fontSize:10, letterSpacing:'.08em',
            position:'relative'
          }}>
            <span style={{fontSize:15, color: t.dot ? C.red : 'inherit'}}>{t.i}</span>
            <span>{t.l.toUpperCase()}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ====== Dashboard ====== */
function MobileDashboard(){
  return (
    <AppChrome title="Rugby|Stats." tab="home">
      {/* KPI ticker, horizontal scroll */}
      <div style={{display:'flex', gap:2, padding:'0 20px 16px', overflowX:'auto'}}>
        {[
          {l:'Comps',n:'40',d:'+2 this mo'},
          {l:'Teams',n:'532',d:'22 nations'},
          {l:'Players',n:'9,032',d:'+127 wk'},
          {l:'Matches',n:'9,120',d:'18 this wk', hot:true},
        ].map(k=>(
          <div key={k.l} style={{minWidth:110, background:C.bg2, border:`1px solid ${C.line}`, borderTop: k.hot?`2px solid ${C.yellow}`:`1px solid ${C.line}`, padding:'12px 14px', display:'flex', flexDirection:'column', gap:4}}>
            <div style={{fontFamily:mono, fontSize:9, color:C.muted, letterSpacing:'.2em', textTransform:'uppercase'}}>{k.l}</div>
            <div style={{fontFamily:arch, fontWeight:900, fontSize:28, lineHeight:1, letterSpacing:'-.03em', color: k.hot?C.yellow:C.ink}}>{k.n}</div>
            <div style={{fontFamily:mono, fontSize:10, color:C.green}}>{k.d}</div>
          </div>
        ))}
      </div>

      {/* Live strip */}
      <div style={{padding:'0 20px 10px', display:'flex', alignItems:'center', gap:8}}>
        <span style={{width:7, height:7, borderRadius:'50%', background:C.red, animation:'pulse 1.4s ease-in-out infinite', display:'inline-block'}} />
        <div style={{fontFamily:arch, fontWeight:800, fontSize:14, textTransform:'uppercase', letterSpacing:'.06em', color:C.red}}>LIVE · 3 matches</div>
        <div style={{flex:1}} />
        <div style={{fontFamily:mono, fontSize:10, color:C.yellow, letterSpacing:'.1em'}}>ALL →</div>
      </div>

      {[
        {c:'URC · R15', mn:'67\'', h:'Sharks', sh:17, sa:9, a:'Zebre', winner:'h'},
        {c:'URC · R15', mn:'23\'', h:'Cardiff', sh:7, sa:7, a:'Ospreys'},
        {c:'PREM · R14', mn:'HT', h:'Falcons', sh:3, sa:14, a:'Bristol', winner:'a'},
      ].map((m,i)=>(
        <div key={i} style={{
          margin:'0 20px 6px', background:`linear-gradient(90deg, rgba(230,57,70,.12), ${C.bg2} 60%)`,
          borderLeft:`3px solid ${C.red}`, padding:'12px 14px',
          display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:12, alignItems:'center'
        }}>
          <div>
            <div style={{fontFamily:mono, fontSize:9, color:C.red, letterSpacing:'.1em', fontWeight:700, marginBottom:2, display:'flex', alignItems:'center', gap:4}}>
              <span style={{width:5, height:5, borderRadius:'50%', background:C.red, animation:'pulse 1.4s ease-in-out infinite'}} />
              {m.mn}
            </div>
            <div style={{fontWeight:700, fontSize:14}}>{m.h}</div>
            <div style={{fontWeight:700, fontSize:14, color:'#aab4ad'}}>{m.a}</div>
          </div>
          <div style={{fontFamily:arch, fontWeight:900, fontSize:22, lineHeight:1, letterSpacing:'-.02em', textAlign:'center'}}>
            <div style={{color: m.winner==='h'?C.yellow:C.ink}}>{m.sh}</div>
            <div style={{color: m.winner==='a'?C.yellow:C.ink}}>{m.sa}</div>
          </div>
          <div style={{fontFamily:mono, fontSize:9, color:C.muted, letterSpacing:'.1em', textAlign:'right'}}>{m.c}</div>
        </div>
      ))}

      {/* Latest results section */}
      <div style={{padding:'20px 20px 10px', display:'flex', alignItems:'center', gap:10}}>
        <span style={{width:3, height:16, background:C.yellow}} />
        <div style={{fontFamily:arch, fontWeight:800, fontSize:16, textTransform:'uppercase', letterSpacing:'-.01em'}}>Latest Results</div>
      </div>

      {[
        {c:'Top 14', h:'Racing 92', sh:41, sa:23, a:'Lyon', d:'18 APR', w:'h'},
        {c:'URC R15', h:'Dragons', sh:7, sa:47, a:'Bulls', d:'17 APR', w:'a'},
        {c:'URC R15', h:'Glasgow', sh:32, sa:14, a:'Lions', d:'17 APR', w:'h'},
        {c:'Prem R13', h:'Harlequins', sh:22, sa:28, a:'Gloucester', d:'18 APR', w:'a'},
      ].map((m,i)=>(
        <div key={i} style={{
          margin:'0 20px 2px', background:C.bg2, padding:'12px 14px',
          display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:12, alignItems:'center'
        }}>
          <div>
            <div style={{fontFamily:mono, fontSize:9, color:C.muted, letterSpacing:'.1em', marginBottom:2, textTransform:'uppercase'}}>{m.c}</div>
            <div style={{fontWeight:700, fontSize:14}}>{m.h}</div>
            <div style={{fontWeight:700, fontSize:14, color:'#aab4ad'}}>{m.a}</div>
          </div>
          <div style={{fontFamily:arch, fontWeight:900, fontSize:22, lineHeight:1.05, letterSpacing:'-.02em', textAlign:'center'}}>
            <div style={{color: m.w==='h'?C.yellow:C.ink}}>{m.sh}</div>
            <div style={{color: m.w==='a'?C.yellow:C.ink}}>{m.sa}</div>
          </div>
          <div style={{fontFamily:mono, fontSize:9, color:C.muted, textAlign:'right', letterSpacing:'.1em'}}>{m.d}</div>
        </div>
      ))}

      {/* Ask */}
      <div style={{margin:'24px 20px 0', padding:'18px 16px', borderRadius:6, background:`radial-gradient(400px 150px at 0% 0%, rgba(255,209,0,.15), transparent 60%), #0e1813`, border:`1px solid ${C.line}`}}>
        <div style={{fontFamily:arch, fontWeight:800, fontSize:16, marginBottom:4, textTransform:'uppercase', letterSpacing:'-.01em'}}>Ask the Bot.</div>
        <div style={{color:'#aab4ad', fontSize:12, lineHeight:1.5, marginBottom:10}}>Plain-English questions on any team, player or match since 1871.</div>
        <div style={{display:'flex', gap:8, background:C.bg2, border:`1px solid ${C.line}`, borderRadius:4, padding:4}}>
          <div style={{flex:1, fontSize:12, color:C.muted, padding:'8px 10px'}}>"How many tries has Pollard scored in 2026?"</div>
          <button style={{background:C.yellow, color:'#0a1410', border:'none', borderRadius:3, padding:'6px 14px', fontWeight:800, fontSize:11, letterSpacing:'.08em'}}>ASK</button>
        </div>
      </div>
    </AppChrome>
  );
}

/* ====== Match live ====== */
function MobileMatch(){
  return (
    <AppChrome title="Live|Match" tab="live">
      {/* Hero scoreboard */}
      <div style={{margin:'0 20px 16px', background:`linear-gradient(180deg, rgba(230,57,70,.18), ${C.bg2})`, border:`1px solid ${C.line}`, borderTop:`3px solid ${C.red}`, padding:'14px 16px', borderRadius:4}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <div style={{fontFamily:mono, fontSize:10, color:C.red, letterSpacing:'.15em', fontWeight:700, display:'flex', alignItems:'center', gap:6}}>
            <span style={{width:7, height:7, borderRadius:'50%', background:C.red, animation:'pulse 1.4s ease-in-out infinite'}} />
            LIVE · 67'
          </div>
          <div style={{fontFamily:mono, fontSize:10, color:C.muted, letterSpacing:'.1em'}}>URC · R15 · DURBAN</div>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:12, alignItems:'center'}}>
          <div style={{textAlign:'center'}}>
            <div style={{width:48, height:48, borderRadius:'50%', background:'#5f1a1a', margin:'0 auto 8px', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:arch, fontWeight:900, fontSize:18, color:'#fff', boxShadow:'inset 0 -4px 8px rgba(0,0,0,.35)'}}>SH</div>
            <div style={{fontFamily:arch, fontWeight:900, fontSize:13, textTransform:'uppercase', letterSpacing:'-.01em'}}>Sharks</div>
            <div style={{fontFamily:arch, fontWeight:900, fontSize:56, lineHeight:1, letterSpacing:'-.04em', color:C.yellow, marginTop:4}}>17</div>
          </div>
          <div style={{fontFamily:arch, fontWeight:900, fontSize:32, color:C.muted, letterSpacing:'-.03em'}}>—</div>
          <div style={{textAlign:'center'}}>
            <div style={{width:48, height:48, borderRadius:'50%', background:'#1e5631', margin:'0 auto 8px', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:arch, fontWeight:900, fontSize:18, color:'#fff', boxShadow:'inset 0 -4px 8px rgba(0,0,0,.35)'}}>ZE</div>
            <div style={{fontFamily:arch, fontWeight:900, fontSize:13, textTransform:'uppercase', letterSpacing:'-.01em'}}>Zebre</div>
            <div style={{fontFamily:arch, fontWeight:900, fontSize:56, lineHeight:1, letterSpacing:'-.04em', marginTop:4}}>9</div>
          </div>
        </div>
        {/* progress bar */}
        <div style={{marginTop:14, height:3, background:'rgba(255,255,255,.08)', position:'relative'}}>
          <div style={{position:'absolute', inset:'0 auto 0 0', width:'84%', background:C.red}} />
          <div style={{position:'absolute', top:-2, left:'50%', width:1, height:7, background:C.muted}} />
        </div>
        <div style={{display:'flex', justifyContent:'space-between', marginTop:6, fontFamily:mono, fontSize:9, color:C.muted, letterSpacing:'.1em'}}>
          <span>KO</span><span>HT</span><span style={{color:C.red}}>67'</span><span>80'</span>
        </div>
      </div>

      {/* tabs */}
      <div style={{display:'flex', gap:0, borderBottom:`1px solid ${C.line}`, margin:'0 20px 12px'}}>
        {['Timeline','Stats','Lineups','H2H'].map((t,i)=>(
          <div key={t} style={{
            fontFamily:arch, fontWeight:700, fontSize:11, padding:'8px 12px',
            color: i===0 ? C.yellow : '#aab4ad',
            borderBottom: i===0 ? `2px solid ${C.yellow}` : '2px solid transparent',
            letterSpacing:'.06em', textTransform:'uppercase'
          }}>{t}</div>
        ))}
      </div>

      {/* timeline */}
      <div style={{padding:'0 20px'}}>
        {[
          {t:'67\'', ev:'TRY', side:'h', p:'M. Fassi', det:'converted · M. Libbok'},
          {t:'58\'', ev:'PEN', side:'h', p:'C. Bosch', det:'3 points · 40m'},
          {t:'52\'', ev:'YC', side:'a', p:'G. Licata', det:'high tackle · 10 mins'},
          {t:'HT', ev:null, side:null, det:'10 — 6'},
          {t:'38\'', ev:'TRY', side:'a', p:'P. Odogwu', det:'converted · L. Da Re'},
          {t:'24\'', ev:'TRY', side:'h', p:'E. van der Merwe', det:'converted · M. Libbok'},
          {t:'12\'', ev:'PEN', side:'h', p:'C. Bosch', det:'3 points · 30m'},
        ].map((e,i)=>{
          if(!e.ev) return (
            <div key={i} style={{display:'flex', alignItems:'center', gap:8, padding:'10px 0'}}>
              <div style={{flex:1, height:1, background:C.line}} />
              <div style={{fontFamily:mono, fontSize:10, color:C.muted, letterSpacing:'.2em'}}>HALF TIME · {e.det}</div>
              <div style={{flex:1, height:1, background:C.line}} />
            </div>
          );
          const color = e.ev==='TRY' ? C.green : e.ev==='YC' ? C.yellow : '#aab4ad';
          return (
            <div key={i} style={{display:'grid', gridTemplateColumns:'36px 1fr', gap:10, padding:'10px 0', borderBottom:`1px solid rgba(255,255,255,.04)`}}>
              <div style={{fontFamily:mono, fontSize:11, color:C.yellow, fontWeight:700}}>{e.t}</div>
              <div style={{display:'flex', gap:8, alignItems:'flex-start'}}>
                <div style={{width:3, height:32, background:color, flexShrink:0, marginTop:2}} />
                <div style={{flex:1}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                    <div style={{fontFamily:arch, fontWeight:800, fontSize:13, letterSpacing:'.06em', color:color, textTransform:'uppercase'}}>{e.ev}</div>
                    <div style={{fontFamily:mono, fontSize:9, color:C.muted, letterSpacing:'.1em'}}>{e.side==='h'?'SHARKS':'ZEBRE'}</div>
                  </div>
                  <div style={{fontWeight:700, fontSize:13, marginTop:2}}>{e.p}</div>
                  <div style={{fontFamily:mono, fontSize:10, color:C.muted, marginTop:1}}>{e.det}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* quick stat mini */}
      <div style={{margin:'20px 20px 0', background:C.bg2, border:`1px solid ${C.line}`, padding:14}}>
        <div style={{fontFamily:arch, fontWeight:800, fontSize:12, textTransform:'uppercase', letterSpacing:'.08em', color:C.yellow, marginBottom:12}}>Possession</div>
        {[
          {l:'Possession', h:58, a:42},
          {l:'Territory', h:61, a:39},
          {l:'Tackle success', h:88, a:79},
          {l:'Lineouts won', h:11, a:8},
        ].map(s=>(
          <div key={s.l} style={{marginBottom:10}}>
            <div style={{display:'flex', justifyContent:'space-between', fontFamily:mono, fontSize:10, color:C.muted, letterSpacing:'.08em', marginBottom:4, textTransform:'uppercase'}}>
              <span style={{color: s.h>s.a?C.yellow:C.ink, fontWeight:700}}>{s.h}{typeof s.h==='number' && s.h<=100?'%':''}</span>
              <span>{s.l}</span>
              <span style={{color: s.a>s.h?C.yellow:C.ink, fontWeight:700}}>{s.a}{typeof s.a==='number' && s.a<=100?'%':''}</span>
            </div>
            <div style={{display:'flex', height:4, gap:2}}>
              <div style={{flex: s.h, background: s.h>s.a?C.yellow:'#3a4a42'}} />
              <div style={{flex: s.a, background: s.a>s.h?C.yellow:'#3a4a42'}} />
            </div>
          </div>
        ))}
      </div>
    </AppChrome>
  );
}

/* ====== Player profile ====== */
function MobilePlayer(){
  return (
    <AppChrome title="Handré|Pollard." tab="players">
      {/* Portrait block */}
      <div style={{margin:'0 20px 16px', display:'flex', gap:14, alignItems:'center'}}>
        <div style={{width:76, height:76, borderRadius:6, background:'#1a4d7a', border:`3px solid ${C.yellow}`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:arch, fontWeight:900, fontSize:30, color:'#fff', flexShrink:0, position:'relative', overflow:'hidden'}}>
          HP
          <div style={{position:'absolute', bottom:2, right:4, fontSize:14, color:C.yellow}}>10</div>
        </div>
        <div style={{flex:1, minWidth:0}}>
          <div style={{fontFamily:mono, fontSize:10, color:C.yellow, letterSpacing:'.15em', marginBottom:3}}>BULLS · FLY-HALF · #10</div>
          <div style={{fontSize:12, color:'#aab4ad', marginBottom:5}}>Born 11 Mar 1994 · age 32 · Somerset West, ZA</div>
          <div style={{display:'inline-block', fontFamily:mono, fontSize:9, padding:'3px 7px', background:C.green, color:'#fff', letterSpacing:'.15em', fontWeight:700}}>ACTIVE</div>
        </div>
      </div>

      {/* Career headline */}
      <div style={{margin:'0 20px 16px', background:`linear-gradient(120deg, rgba(26,77,122,.35), ${C.bg2})`, border:`1px solid ${C.line}`, borderTop:`2px solid ${C.yellow}`, padding:'14px 16px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <div>
          <div style={{fontFamily:mono, fontSize:10, color:C.muted, letterSpacing:'.2em'}}>CAREER POINTS</div>
          <div style={{fontFamily:mono, fontSize:10, color:C.green, marginTop:4}}>+31 in R15 vs Dragons</div>
        </div>
        <div style={{fontFamily:arch, fontWeight:900, fontSize:56, color:C.yellow, lineHeight:1, letterSpacing:'-.04em'}}>1474</div>
      </div>

      {/* stat grid */}
      <div style={{padding:'0 20px 16px', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:2}}>
        {[
          {l:'Apps', n:'154'},
          {l:'Tries', n:'18', c:C.green},
          {l:'Pts', n:'1474', c:C.yellow, hot:true},
          {l:'Conv', n:'296', c:'#6cb4ff'},
          {l:'Pen', n:'254', c:C.yellow, hot:true},
          {l:'DG', n:'10'},
        ].map(s=>(
          <div key={s.l} style={{background:C.bg2, padding:'12px 10px', borderTop: s.hot?`2px solid ${C.yellow}`:'2px solid transparent'}}>
            <div style={{fontFamily:mono, fontSize:9, color:C.muted, letterSpacing:'.15em', textTransform:'uppercase'}}>{s.l}</div>
            <div style={{fontFamily:arch, fontWeight:900, fontSize:26, lineHeight:1, letterSpacing:'-.03em', color: s.c||C.ink, marginTop:6}}>{s.n}</div>
          </div>
        ))}
      </div>

      {/* Tries per season chart */}
      <div style={{margin:'0 20px 16px', background:C.bg2, border:`1px solid ${C.line}`, padding:'14px 16px'}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:12}}>
          <div style={{fontFamily:arch, fontWeight:800, fontSize:12, textTransform:'uppercase', letterSpacing:'.08em', color:C.yellow}}>Tries / Season</div>
          <div style={{fontFamily:mono, fontSize:9, color:C.muted}}>since 2010</div>
        </div>
        <div style={{display:'flex', gap:4, alignItems:'flex-end', height:80, borderBottom:`1px solid ${C.line}`}}>
          {[1,3,1,2,3,2,1,2,1,2,2,1,0].map((v,i)=>(
            <div key={i} style={{flex:1, position:'relative', height:`${v*22 || 4}%`, background: v?C.yellow:'rgba(255,255,255,.1)'}}>
              {v>0 && <div style={{position:'absolute', bottom:'100%', left:0, right:0, textAlign:'center', fontFamily:mono, fontSize:8, color:C.ink, marginBottom:2}}>{v}</div>}
            </div>
          ))}
        </div>
      </div>

      {/* Career */}
      <div style={{padding:'0 20px', marginBottom:12}}>
        <div style={{fontFamily:arch, fontWeight:800, fontSize:12, textTransform:'uppercase', letterSpacing:'.1em', color:C.yellow, marginBottom:8}}>Career</div>
        {[
          {t:'South Africa', y:'2015 — Present', cur:true},
          {t:'Bulls', y:'2014 — Present', cur:true},
          {t:'Leicester Tigers', y:'2022 — 2025'},
          {t:'Montpellier', y:'2022'},
        ].map((c,i)=>(
          <div key={i} style={{
            background:C.bg2, padding:'10px 12px', borderLeft:`3px solid ${c.cur?C.yellow:C.line}`,
            marginBottom:2, display:'flex', justifyContent:'space-between', alignItems:'center',
            ...(c.cur ? {background:`linear-gradient(90deg, rgba(255,209,0,.06), ${C.bg2} 60%)`} : {})
          }}>
            <div>
              <div style={{fontWeight:700, fontSize:13}}>{c.t}</div>
              <div style={{fontFamily:mono, fontSize:10, color:C.muted, marginTop:2}}>{c.y}</div>
            </div>
            {c.cur && <div style={{fontFamily:mono, fontSize:9, color:C.yellow, letterSpacing:'.1em'}}>CURRENT</div>}
          </div>
        ))}
      </div>

      {/* Recent apps */}
      <div style={{padding:'8px 20px 0'}}>
        <div style={{fontFamily:arch, fontWeight:800, fontSize:12, textTransform:'uppercase', letterSpacing:'.1em', color:C.yellow, marginBottom:8}}>Recent Appearances</div>
        {[
          {d:'17 APR', c:'URC R15', o:'Dragons', s:'47–7', w:true},
          {d:'04 APR', c:'ERC Cup', o:'Glasgow', s:'21–26', w:false},
          {d:'28 MAR', c:'URC R14', o:'Munster', s:'34–31', w:true},
          {d:'20 MAR', c:'URC R13', o:'Cardiff', s:'40–7', w:true},
        ].map((a,i)=>(
          <div key={i} style={{background:C.bg2, padding:'10px 12px', marginBottom:2, display:'grid', gridTemplateColumns:'48px 1fr auto auto', gap:10, alignItems:'center'}}>
            <div style={{fontFamily:mono, fontSize:10, color:C.yellow, letterSpacing:'.05em'}}>{a.d}</div>
            <div>
              <div style={{fontWeight:700, fontSize:13}}>vs {a.o}</div>
              <div style={{fontFamily:mono, fontSize:9, color:C.muted, letterSpacing:'.08em', marginTop:1}}>{a.c}</div>
            </div>
            <div style={{fontFamily:arch, fontWeight:900, fontSize:15, letterSpacing:'-.02em'}}>{a.s}</div>
            <div style={{fontFamily:mono, fontSize:10, fontWeight:700, color: a.w?C.green:C.red}}>{a.w?'W':'L'}</div>
          </div>
        ))}
      </div>
    </AppChrome>
  );
}

/* ====== Stage ====== */
const screens = [
  {label:'01 · Dashboard', sub:'Live up top → recent results', Comp: MobileDashboard},
  {label:'02 · Match · Live', sub:'In-progress · timeline + stats', Comp: MobileMatch},
  {label:'03 · Player Profile', sub:'Pollard · career + measure', Comp: MobilePlayer},
];

function Stage(){
  return (
    <>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}} ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}`}</style>
      {screens.map(s=>(
        <div key={s.label} className="frame-wrap">
          <div className="frame-label">{s.label}</div>
          <div className="frame-sub">{s.sub}</div>
          <IOSDevice dark={true} width={390} height={800}>
            <s.Comp/>
          </IOSDevice>
        </div>
      ))}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('stage')).render(<Stage/>);
</script>
</body>
